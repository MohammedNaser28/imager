name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Produce patched Wayland-compatible AppImage
        shell: bash
        run: |
          set -euo pipefail

          APPDIR="src-tauri/target/release/bundle/appimage"
          ORIGINAL=$(ls "$APPDIR"/*.AppImage | head -1)
          VERSION="$(echo "$ORIGINAL" | sed -E 's/.*Imagers_([0-9]+\.[0-9]+\.[0-9]+)_amd64\.AppImage/\1/')"
          echo "Original: $ORIGINAL (version $VERSION)"

          cd "$APPDIR"
          chmod +x "$(basename "$ORIGINAL")"
          ./"$(basename "$ORIGINAL")" --appimage-extract > /dev/null 2>&1

          HOOK="squashfs-root/apprun-hooks/linuxdeploy-plugin-gtk.sh"
          if [ -f "$HOOK" ]; then
            sed -i 's/^export GDK_BACKEND=x11/# export GDK_BACKEND=x11 # removed for Wayland compat/' "$HOOK"
            echo "Patched: $HOOK"
            grep -n "GDK_BACKEND" "$HOOK"
          else
            echo "WARNING: GTK hook not found at $HOOK"
            ls squashfs-root/apprun-hooks/ 2>/dev/null || true
          fi

          cd /tmp
          APPIMAGETOOL="appimagetool-x86_64.AppImage"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/$APPIMAGETOOL" -O "$APPIMAGETOOL"
          chmod +x "$APPIMAGETOOL"

          APPIMAGE_EXTRACT_AND_RUN=1 \
          ARCH=x86_64 \
          ./"$APPIMAGETOOL" \
            --no-appstream \
            "$GITHUB_WORKSPACE/$APPDIR/squashfs-root" \
            "$GITHUB_WORKSPACE/$APPDIR/Imagers-${VERSION}_patched-x86_64.AppImage"

          echo "Patched AppImage created"
          ls -lh "$GITHUB_WORKSPACE/$APPDIR/Imagers-${VERSION}_patched-x86_64.AppImage"

          rm -rf "$GITHUB_WORKSPACE/$APPDIR/squashfs-root" /tmp/$APPIMAGETOOL

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imager-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imager-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Flatten artifacts
        run: |
          mkdir -p artifacts
          for dir in imager-linux imager-windows; do
            [ -d "$dir" ] && find "$dir" -type f -exec cp {} artifacts/ \;
          done

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          LINUX_SIG_FILE=$(find imager-linux -name "*.AppImage.sig" | head -n 1)
          WIN_SIG_FILE=$(find imager-windows -name "*.msi.sig" | head -n 1)

          if [ -z "$LINUX_SIG_FILE" ]; then echo "Error: Linux signature not found"; exit 1; fi
          if [ -z "$WIN_SIG_FILE" ]; then echo "Error: Windows signature not found"; exit 1; fi

          LINUX_SIG=$(cat "$LINUX_SIG_FILE")
          WIN_SIG=$(cat "$WIN_SIG_FILE")

          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "Release $VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "https://github.com/MohammedNaser28/imager/releases/download/$GITHUB_REF_NAME/Imagers_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/MohammedNaser28/imager/releases/download/$GITHUB_REF_NAME/Imagers_${VERSION}_x64_en-US.msi"
              }
            }
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            latest.json
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
            artifacts/*.msi
            artifacts/*.exe
